<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07090F">
<title>東方之音 DONAUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=202605061719">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg-0, #07090F); }
  #page {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    border: 0;
    display: block;
    background: transparent;
    transition: opacity 0.2s ease;
  }
  #page.loading { opacity: 0.55; }
</style>
</head>
<body>
<!-- ===== 启动页（shell 层）===== -->
<div class="splash" id="splash">
  <div class="splash-bg"></div>
  <div class="splash-ring" style="width:240px;height:240px;"></div>
  <div class="splash-ring" style="width:380px;height:380px;"></div>
  <div class="splash-ring" style="width:520px;height:520px;"></div>
  <div class="splash-content" id="splashEnter">
    <img class="splash-char-img" src="assets/dong-ink.png" alt="東" draggable="false">
    <div class="splash-hint">— 点击进入 —</div>
  </div>
</div>

<!-- Shell：流体背景 + 悬浮播放器 + iframe。播放器永远住在这一层，iframe 切换不打断 BGM。 -->
<div class="flux-bg"></div>
<div class="flux-grid"></div>

<iframe id="page" name="page" src="" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

<script src="assets/svg.js?v=202605061719"></script>
<script src="assets/data.js?v=202605061719"></script>
<script src="assets/auth.js?v=202605061719"></script>
<script src="assets/player.js?v=202605061719"></script>
<script src="assets/messenger.js?v=202605061719"></script>
<script>
/* ===== Shell splash：每个会话只播一次 ===== */
(function shellSplash() {
  const splash = document.getElementById('splash');
  const enter  = document.getElementById('splashEnter');
  if (!splash) return;
  let alreadySeen = false;
  try { alreadySeen = sessionStorage.getItem('dn_splash_seen') === '1'; } catch (e) {}
  if (alreadySeen) {
    splash.classList.add('hidden');
    splash.style.display = 'none';
    return;
  }
  function dismiss() {
    if (splash.classList.contains('hidden')) return;
    splash.classList.add('hidden');
    try { sessionStorage.setItem('dn_splash_seen', '1'); } catch (e) {}
    setTimeout(() => { splash.style.display = 'none'; }, 1000);
  }
  splash.addEventListener('click', dismiss);
  if (enter) enter.addEventListener('click', dismiss);
  window.addEventListener('keydown', dismiss, { once: true });
  // 6 秒兜底自动消失
  setTimeout(dismiss, 6000);
})();

/* ===== Shell 路由：hash -> iframe src ===== */
(function shellRouter() {
  const frame = document.getElementById('page');

  function resolveSrc() {
    let h = location.hash || '#/';
    h = h.replace(/^#\/?/, '');
    if (!h || h === '' || h === '/') return 'home.html';
    if (h.startsWith('index.html')) return h.replace('index.html', 'home.html');
    return h;
  }

  function syncFrame() {
    const target = resolveSrc();
    const cur = frame.getAttribute('data-src') || '';
    if (cur === target) return;
    frame.setAttribute('data-src', target);
    frame.classList.add('loading');
    frame.src = target + (target.includes('?') ? '&' : '?') + 'embed=1';
  }

  frame.addEventListener('load', () => frame.classList.remove('loading'));

  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'dn:navigate') {
      const u = e.data.url;
      if (!u) return;
      const clean = u.replace(/^\.\//, '').replace(/^\//, '');
      location.hash = '#/' + clean;
      try { frame.contentWindow.scrollTo(0, 0); } catch(e2) {}
    }
    if (e.data.type === 'dn:title' && e.data.title) {
      document.title = e.data.title;
    }
  });

  window.addEventListener('hashchange', syncFrame);
  syncFrame();
})();
</script>
</body>
</html>
