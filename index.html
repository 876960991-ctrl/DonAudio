<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東方之音 DONAUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=202604301320">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg-0, #07090F); }
  #page {
    width: 100%;
    height: 100vh;
    border: 0;
    display: block;
    background: transparent;
    transition: opacity 0.2s ease;
  }
  #page.loading { opacity: 0.55; }
  /* 隐藏 iframe 里的 dn-player（防止嵌套重复） */
</style>
</head>
<body>
<!-- ⚠️ Shell 只放：流体背景 + 悬浮播放器 + iframe。
     播放器 audio 永远住在这一层，iframe 里任何页面切换、刷新都不会动到它。 -->
<div class="flux-bg"></div>
<div class="flux-grid"></div>

<iframe id="page" name="page" src="" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

<script src="assets/svg.js?v=202604301320"></script>
<script src="assets/data.js?v=202604301320"></script>
<script src="assets/player.js?v=202604301320"></script>
<script>
/* ===== Shell 路由：hash -> iframe src ===== */
(function shellRouter() {
  const frame = document.getElementById('page');

  // 把 hash（如 "#/arranging"）翻译成 iframe 里要加载的 HTML
  function resolveSrc() {
    let h = location.hash || '#/';
    // 去掉开头的 #
    h = h.replace(/^#\/?/, '');
    if (!h || h === '' || h === '/') return 'home.html';
    // index.html 被重定向到 home.html（避免 shell 自包含）
    if (h.startsWith('index.html')) return h.replace('index.html', 'home.html');
    return h;
  }

  function syncFrame() {
    const target = resolveSrc();
    const cur = frame.getAttribute('data-src') || '';
    if (cur === target) return;
    frame.setAttribute('data-src', target);
    frame.classList.add('loading');
    frame.src = target + (target.includes('?') ? '&' : '?') + 'embed=1';
  }

  frame.addEventListener('load', () => frame.classList.remove('loading'));

  // iframe 内页面希望 shell 导航（比如点了一个 <a href>），用 postMessage
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'dn:navigate') {
      const u = e.data.url;
      if (!u) return;
      // 把目标 URL（相对路径）改成 hash
      const clean = u.replace(/^\.\//, '').replace(/^\//, '');
      location.hash = '#/' + clean;
    }
    if (e.data.type === 'dn:title' && e.data.title) {
      document.title = e.data.title;
    }
  });

  window.addEventListener('hashchange', syncFrame);
  syncFrame();
})();
</script>
</body>
</html>
