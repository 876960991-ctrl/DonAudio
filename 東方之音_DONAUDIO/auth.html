<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>加入 · 東方之音 DONAUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=202605061719">
<script src="assets/embed.js?v=202605061719"></script>
</head>
<body>
<div class="flux-bg"></div>
<div class="flux-grid"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span id="navLogo"></span>
      東方之音
    </a>
    <div class="nav-links">
      <a href="home.html">首页</a>
      <a href="arranging.html">编曲</a>
      <a href="mixing.html">混音母带</a>
      <a href="songwriting.html">作词作曲</a>
      <a href="sounddesign.html">声音设计</a>
      <a href="scoring.html">影视配乐</a>
      <a href="community.html">社区</a>
    </div>
    <div class="nav-right">
      <a href="brief.html" class="btn btn-ghost">发布需求</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h2>欢迎回到 <span style="background: linear-gradient(135deg,#00FF87,#7B2FBE,#FF0080); -webkit-background-clip:text; background-clip:text; color:transparent;">東方之音</span></h2>
    <div class="sub">不抽佣、不插手 — 只做连接的声音创作者社区</div>

    <!-- 已登录提示 -->
    <div id="alreadyLoggedIn" style="display:none; text-align:center; padding:24px 0;">
      <div style="font-size:15px; margin-bottom:16px;">你已经登录为 <strong id="curName" style="color:#00FF87;">—</strong></div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <a id="goProfileBtn" href="#" class="btn btn-primary">去我的主页</a>
        <button id="doLogout" class="btn btn-outline">退出登录</button>
      </div>
    </div>

    <!-- 登录/注册表单 -->
    <div id="authForm">
      <div class="tab-switch">
        <button class="on" id="tabLogin" type="button">登录</button>
        <button id="tabReg" type="button">注册</button>
      </div>

      <!-- 注册时显示 -->
      <div id="regOnly" style="display:none;">
        <div style="font-size:12px; color:var(--ink-dim); margin-bottom:8px; letter-spacing:1px;">我的身份 · I AM</div>
        <div class="role-pick" id="rolePick">
          <div class="opt on" data-role="编曲"><div class="t">編曲</div><div class="d">Arranger</div></div>
          <div class="opt" data-role="混音师"><div class="t">混音 / 母带</div><div class="d">Mixing & Mastering</div></div>
        </div>
        <div class="role-pick" id="rolePick2" style="margin-top:10px;">
          <div class="opt" data-role="作词作曲"><div class="t">作词作曲</div><div class="d">Songwriter</div></div>
          <div class="opt" data-role="声音设计"><div class="t">声音设计</div><div class="d">Sound Design</div></div>
        </div>
        <div class="role-pick" id="rolePick3" style="margin-top:10px; grid-template-columns: 1fr 1fr;">
          <div class="opt" data-role="影视配乐"><div class="t">影视配乐</div><div class="d">Scoring</div></div>
          <div class="opt" data-role="需求方"><div class="t">需求方</div><div class="d">Client</div></div>
        </div>
      </div>

      <div class="field">
        <label id="nameLabel">昵称 <span style="color:#FF4E94;">*</span></label>
        <input id="f-name" type="text" placeholder="登录时可用昵称、邮箱或手机号">
      </div>
      <div id="regFields" style="display:none;">
        <div class="field">
          <label>邮箱 <span style="color:var(--ink-mute); font-weight:400;">(邮箱、手机号至少填一项)</span></label>
          <input id="f-email" type="email" placeholder="you@donaudio.com">
        </div>
        <div class="field">
          <label>手机号</label>
          <input id="f-phone" type="tel" placeholder="11 位大陆手机号">
        </div>
        <div class="field">
          <label>所在城市（可选）</label>
          <input id="f-city" type="text" placeholder="例：上海 / 北京">
        </div>
      </div>
      <div class="field">
        <label>密码 <span style="color:#FF4E94;">*</span></label>
        <input id="f-pwd" type="password" placeholder="至少 6 位">
      </div>
      <div class="field" id="pwd2Field" style="display:none;">
        <label>确认密码 <span style="color:#FF4E94;">*</span></label>
        <input id="f-pwd2" type="password" placeholder="再输一次以确认">
      </div>

      <div id="errBox" style="display:none; padding:10px 14px; border-radius:8px; background:rgba(255,78,148,0.15); color:#FF4E94; font-size:13px; margin-bottom:12px;"></div>

      <button id="submitBtn" type="button" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
        <span id="submitLabel">登录</span>
      </button>

      <div style="text-align:center; margin-top:16px; color:var(--ink-mute); font-size:12px;">
        · 无后端版本：账号保存在你的浏览器里 ·
      </div>
    </div>
  </div>
</div>

<script src="assets/svg.js?v=202605061719"></script>
<script src="assets/data.js?v=202605061719"></script>
<script src="assets/auth.js?v=202605061719"></script>
<script>
document.getElementById('navLogo').innerHTML = DONAUDIO_SVG.logoMark(30);

const regOnly = document.getElementById('regOnly');
const regFields = document.getElementById('regFields');
const lbl = document.getElementById('submitLabel');
const errBox = document.getElementById('errBox');
const btnLogin = document.getElementById('tabLogin');
const btnReg = document.getElementById('tabReg');
const submitBtn = document.getElementById('submitBtn');
const form = document.getElementById('authForm');
const loggedInBox = document.getElementById('alreadyLoggedIn');
let mode = 'login';
let selectedRole = '编曲';

function showLoggedIn() {
  const cur = window.DNAuth && window.DNAuth.current();
  if (!cur) return false;
  form.style.display = 'none';
  loggedInBox.style.display = 'block';
  document.getElementById('curName').textContent = cur.name;
  document.getElementById('goProfileBtn').href = `profile.html?u=${encodeURIComponent(cur.name)}`;
  return true;
}

if (!showLoggedIn()) {
  const pwd2Field = document.getElementById('pwd2Field');
  const nameLabel = document.getElementById('nameLabel');
  const nameInput = document.getElementById('f-name');

  btnLogin.addEventListener('click', () => {
    mode = 'login';
    btnLogin.classList.add('on'); btnReg.classList.remove('on');
    regOnly.style.display = 'none';
    regFields.style.display = 'none';
    pwd2Field.style.display = 'none';
    nameLabel.innerHTML = '账号 <span style="color:#FF4E94;">*</span>';
    nameInput.placeholder = '昵称 / 邮箱 / 手机号';
    lbl.textContent = '登录';
    errBox.style.display = 'none';
  });
  btnReg.addEventListener('click', () => {
    mode = 'reg';
    btnReg.classList.add('on'); btnLogin.classList.remove('on');
    regOnly.style.display = 'block';
    regFields.style.display = 'block';
    pwd2Field.style.display = 'block';
    nameLabel.innerHTML = '昵称 / 艺名 <span style="color:#FF4E94;">*</span>';
    nameInput.placeholder = '显示在你主页的昵称';
    lbl.textContent = '创建我的账号';
    errBox.style.display = 'none';
  });

  // 角色选择
  document.querySelectorAll('#regOnly .role-pick .opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('#regOnly .role-pick .opt').forEach(o => o.classList.remove('on'));
      opt.classList.add('on');
      selectedRole = opt.dataset.role;
    });
  });

  submitBtn.addEventListener('click', () => {
    errBox.style.display = 'none';
    const name = document.getElementById('f-name').value.trim();
    const pwd  = document.getElementById('f-pwd').value;
    let r;
    if (mode === 'login') {
      r = window.DNAuth.login(name, pwd);
    } else {
      const email = document.getElementById('f-email').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const city  = document.getElementById('f-city').value.trim();
      const pwd2  = document.getElementById('f-pwd2').value;
      r = window.DNAuth.register({ name, pwd, pwd2, email, phone, city, role: selectedRole });
    }
    if (!r.ok) {
      errBox.style.display = 'block';
      errBox.textContent = '✖ ' + r.msg;
      return;
    }
    const targetUrl = mode === 'reg' ? `profile.html?u=${encodeURIComponent(name)}&edit=1` : 'home.html';
    try {
      window.top.postMessage({ type: 'dn:navigate', url: targetUrl }, '*');
    } catch (e) {
      location.href = targetUrl;
    }
  });

  // Enter 键提交
  ['f-name','f-pwd','f-pwd2','f-email','f-phone','f-city'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitBtn.click(); }
    });
  });
}

document.getElementById('doLogout').addEventListener('click', () => {
  window.DNAuth.logout();
  form.style.display = 'block';
  loggedInBox.style.display = 'none';
});
</script>
<script src="assets/player.js?v=202605061719"></script>
<script src="assets/app.js?v=202605061719"></script>
</body>
</html>
