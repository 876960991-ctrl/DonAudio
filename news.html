<style>
  .news-wrap { max-width: 880px; margin: 0 auto; padding: 60px 32px 100px; }
  .news-crumb { color: var(--ink-mute); font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
  .news-crumb a { color: var(--ink-dim); }
  .news-crumb a:hover { color: var(--ink); }
  .news-tag {
    display: inline-flex; align-items: center; padding: 4px 14px;
    border-radius: 999px; font-size: 12px; letter-spacing: 2px;
    background: linear-gradient(135deg, rgba(0,255,135,0.15), rgba(123,47,190,0.12));
    color: #7FF0DC; margin-bottom: 18px;
  }
  .news-title {
    font-family: var(--font-serif); font-size: clamp(32px, 4.5vw, 56px);
    line-height: 1.2; letter-spacing: 2px; font-weight: 700;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #E8EAF2 40%, #7FF0DC 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .news-meta {
    display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    color: var(--ink-mute); font-size: 13px; margin-bottom: 40px;
  }
  .news-meta .source { color: var(--ink); }
  .news-body {
    font-size: 17px; line-height: 1.95; color: var(--ink);
  }
  .news-body p { margin-bottom: 20px; color: var(--ink-dim); }
  .news-body strong { color: var(--ink); }
  .news-actions {
    display: flex; gap: 12px; margin-top: 40px; padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .news-related {
    margin-top: 60px;
  }
  .news-related h3 {
    font-family: var(--font-serif); font-size: 22px; font-weight: 700;
    letter-spacing: 2px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .news-related h3::before {
    content: ""; width: 4px; height: 18px; border-radius: 2px;
    background: linear-gradient(180deg, #00FF87, #7B2FBE);
  }
  .related-list { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .related-card {
    padding: 18px; border-radius: var(--r-md);
    background: var(--bg-2); border: 1px solid var(--line);
    transition: all .25s; cursor: pointer;
  }
  .related-card:hover { border-color: #00FF87; transform: translateY(-2px); }
  .related-card .tag { font-size: 11px; color: #7FF0DC; letter-spacing: 2px; }
  .related-card .t { font-weight: 600; margin: 8px 0 6px; }
  .related-card .d { font-size: 12px; color: var(--ink-mute); }
  @media (max-width: 640px) {
    .related-list { grid-template-columns: 1fr; }
  }
</style>
<script src="assets/embed.js?v=202604301320"></script>

  </div>

  <h1 class="news-title" id="newsTitle">资讯标题</h1>
  <div class="news-meta">
    <span>来源：<span class="source" id="newsSource"></span></span>

<script>
// LOGO / 图标
document.getElementById('navLogo').innerHTML = DONAUDIO_SVG.logoMark(30);
document.getElementById('footLogo').innerHTML = DONAUDIO_SVG.logoMark(30);
document.getElementById('navSearchIcon').innerHTML = DONAUDIO_SVG.icons.search;

// 导航
document.getElementById('navLinks').innerHTML = `
  <a href="index.html">首页</a>
  ${DONAUDIO_DATA.sections.map(s => `<a href="${s.href}">${s.cn}</a>`).join('')}
  <a href="community.html">社区</a>
`;

// 读取 URL 参数
const params = new URLSearchParams(location.search);
const newsId = params.get('id');

const news = newsId ? DONAUDIO_DATA.newsById(newsId) : null;

if (!news) {
  document.getElementById('newsTitle').textContent = '资讯不存在';
  document.getElementById('newsBody').innerHTML = '<p>请从板块页的今日资讯进入，或返回 <a href="index.html">首页</a>。</p>';
} else {
  const section = DONAUDIO_DATA.sections.find(s => s.id === news.section);
  document.title = `${news.title} · 東方之音 DONAUDIO`;
  document.getElementById('pageTitle').textContent = document.title;
  document.getElementById('crumbSec').textContent = section.cn;
  document.getElementById('crumbSec').href = section.href;
  document.getElementById('backLink').href = section.href;
  document.getElementById('backLink').textContent = `← 返回${section.cn}`;
  document.getElementById('newsTag').textContent = news.tag;
  document.getElementById('newsTitle').textContent = news.title;
  document.getElementById('newsSource').textContent = news.source;
  document.getElementById('newsDate').textContent = news.date;
  document.getElementById('newsViews').textContent = ((parseInt(news.id.replace(/\D/g,'')||'1')) * 1247).toLocaleString();

  // 正文（支持 \n 分段和 **粗体**）
  const bodyHTML = news.body
    .split('\n').filter(line => line.trim())
    .map(line => {
      const withBold = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return `<p>${withBold}</p>`;
    }).join('');
  document.getElementById('newsBody').innerHTML = bodyHTML;

  // 相关：同板块其他条目
  const related = DONAUDIO_DATA.news[news.section].filter(n => n.id !== newsId).slice(0, 4);
  document.getElementById('relatedList').innerHTML = related.map(r => `
    <a href="news.html?id=${r.id}" class="related-card" style="display:block; color:inherit;">
      <div class="tag">${r.tag} · ${r.date}</div>
      <div class="t">${r.title}</div>
      <div class="d">${r.source}</div>
    </a>
  `).join('');
}
</script>
