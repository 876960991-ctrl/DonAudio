<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>搜索 · 東方之音 DONAUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=202605061719">

<style>
  .search-wrap { max-width: 1200px; margin: 0 auto; padding: 60px 32px 100px; }
  .search-hero h1 {
    font-family: var(--font-serif); font-size: clamp(32px, 4.5vw, 56px);
    font-weight: 700; letter-spacing: 2px; margin-bottom: 14px;
    background: linear-gradient(135deg, #E8EAF2 20%, #00FF87 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .search-hero .kw {
    color: #FF4E94; font-weight: 800;
  }
  .search-hero .sub { color: var(--ink-dim); font-size: 15px; }
  .search-tabs {
    display: flex; gap: 4px; margin: 32px 0 24px;
    border-bottom: 1px solid var(--line);
  }
  .search-tabs button {
    padding: 12px 20px; font-size: 14px; color: var(--ink-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .2s;
    background: transparent; border-top: none; border-left: none; border-right: none;
    cursor: pointer;
  }
  .search-tabs button:hover { color: var(--ink); }
  .search-tabs button.on {
    color: var(--ink);
    border-bottom-color: #00FF87;
    font-weight: 600;
  }
  .search-tabs button .count {
    display: inline-block;
    padding: 1px 8px; margin-left: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    font-size: 11px; color: var(--ink-mute);
    font-weight: 400;
  }
  .search-tabs button.on .count {
    background: rgba(0,255,135,0.18); color: #00FF87;
  }
  .search-pane { display: none; }
  .search-pane.on { display: block; }
  .empty {
    padding: 60px 20px; text-align: center; color: var(--ink-mute);
  }

  /* 作品卡（复用 work-grid 样式） */
  /* 用户卡 */
  .user-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .user-card {
    padding: 20px; border-radius: var(--r-md);
    background: var(--bg-2); border: 1px solid var(--line);
    display: flex; gap: 14px; align-items: center;
    cursor: pointer;
    transition: all .25s;
    text-decoration: none; color: inherit;
  }
  .user-card:hover { border-color: #00FF87; transform: translateY(-2px); }
  .user-card .av {
    width: 54px; height: 54px; border-radius: 50%;
    background: linear-gradient(135deg, #00FF87, #7B2FBE, #FF0080);
    background-size: 250% 250%; animation: gradMove 6s ease infinite;
    display: grid; place-items: center;
    font-family: var(--font-serif); font-size: 22px; font-weight: 700;
    color: #0A0E1A; flex-shrink: 0;
  }
  .user-card .meta { min-width: 0; }
  .user-card .name { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .user-card .role { color: var(--ink-dim); font-size: 12px; }
  .user-card .bio { color: var(--ink-mute); font-size: 12px; margin-top: 4px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* 资讯卡 */
  .news-list { display: flex; flex-direction: column; gap: 14px; }
  .news-card {
    padding: 18px 20px; border-radius: var(--r-md);
    background: var(--bg-2); border: 1px solid var(--line);
    text-decoration: none; color: inherit;
    display: block; transition: all .25s;
  }
  .news-card:hover { border-color: #00FF87; transform: translateY(-2px); }
  .news-card .meta {
    display: flex; gap: 12px; color: var(--ink-mute); font-size: 12px; margin-bottom: 6px;
  }
  .news-card .tag {
    padding: 1px 8px; border-radius: 999px;
    background: rgba(0,255,135,0.12); color: #7FF0DC;
  }
  .news-card .t { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .news-card .s { color: var(--ink-dim); font-size: 13px; line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* 作品列表复用 work-grid */
  .search-works { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
</style>
</head>
<body>
<div class="flux-bg"></div>
<div class="flux-grid"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span id="navLogo"></span>
      東方之音
    </a>
    <div class="nav-links">
      <a href="home.html">首页</a>

      <a href="scoring.html">影视配乐</a>
      <a href="community.html">社区</a>
    </div>
    <div class="nav-right">
      <div class="nav-search" style="min-width:300px;">
        <span id="navSearchIcon"></span>
        <input id="searchAgain" placeholder="搜索创作者 / 作品 / 话题">
      </div>
      <a href="brief.html" class="btn btn-ghost">发布需求</a>
      <a href="auth.html" class="btn btn-primary">登录 / 注册</a>
    </div>
  </div>
</nav>

<section class="search-wrap">
  <div class="search-hero">
    <h1 id="resHeading">搜索</h1>
    <div class="sub" id="resSub">共 <span id="resCount">0</span> 条结果</div>
  </div>

  <div class="search-tabs" id="tabs">
    <button class="on" data-tab="works">作品 <span class="count" id="cWorks">0</span></button>
    <button data-tab="users">用户 <span class="count" id="cUsers">0</span></button>
    <button data-tab="news">资讯 <span class="count" id="cNews">0</span></button>
  </div>

  <div class="search-pane on" data-pane="works">
    <div class="search-works" id="paneWorks"></div>
  </div>
  <div class="search-pane" data-pane="users">
    <div class="user-list" id="paneUsers"></div>
  </div>
  <div class="search-pane" data-pane="news">
    <div class="news-list" id="paneNews"></div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <div>
      <a href="home.html" class="nav-logo" style="margin-bottom:16px;">
        <span id="footLogo"></span>
        東方之音
      </a>
      <p style="color:var(--ink-dim); font-size:13px;">DONAUDIO — 让东方的声音被世界听见。</p>
    </div>
    <div><h5>板块</h5><ul>
      <li><a href="arranging.html">编曲</a></li><li><a href="mixing.html">混音母带</a></li>
      <li><a href="songwriting.html">作词作曲</a></li><li><a href="sounddesign.html">声音设计</a></li>
      <li><a href="scoring.html">影视配乐</a></li>
    </ul></div>
    <div><h5>平台</h5><ul>
      <li><a href="community.html">社区</a></li><li><a href="brief.html">发布需求</a></li>
      <li><a href="profile.html">个人主页</a></li>
    </ul></div>
    <div><h5>联系</h5><ul>
      <li>contact@donaudio.com</li><li>微信：東方之音</li>
    </ul></div>
  </div>
  <div class="footer-bottom"><span>© 2026 DONAUDIO · 東方之音</span></div>
</footer>

<script src="assets/svg.js?v=202605061719"></script>
<script src="assets/data.js?v=202605061719"></script>
<script src="assets/auth.js?v=202605061719"></script>
<script>
document.getElementById('navLogo').innerHTML = DONAUDIO_SVG.logoMark(30);
document.getElementById('footLogo').innerHTML = DONAUDIO_SVG.logoMark(30);
document.getElementById('navSearchIcon').innerHTML = DONAUDIO_SVG.icons.search;

const params = new URLSearchParams(location.search);
const q = params.get('q') || '';
document.getElementById('searchAgain').value = q;

// 回车二次搜索
document.getElementById('searchAgain').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const v = e.currentTarget.value.trim();
  if (!v) return;
  const url = 'search.html?q=' + encodeURIComponent(v);
  try { window.top.postMessage({ type:'dn:navigate', url }, '*'); }
  catch(err) { location.href = url; }
});

const result = DONAUDIO_DATA.searchAll(q);

document.getElementById('resHeading').innerHTML = q
  ? `「<span class="kw">${q}</span>」 的搜索结果`
  : '请输入关键词搜索';
document.getElementById('resCount').textContent = result.total;
document.getElementById('cWorks').textContent = result.works.length;
document.getElementById('cUsers').textContent = result.users.length;
document.getElementById('cNews').textContent  = result.news.length;

/* ============== 作品 ============== */
const paneWorks = document.getElementById('paneWorks');
paneWorks.innerHTML = result.works.length ? result.works.map(w => `
  <div class="tile h-md" data-audio="${w.audio || ''}" data-title="${w.t}" data-author="${w.a}" data-cover="${w.seed}" style="display:block; border-radius:var(--r-md); overflow:hidden; background:var(--bg-2); border:1px solid var(--line); position:relative; cursor:pointer; transition: all .25s;">
    <a href="profile.html?u=${encodeURIComponent(w.a)}" style="display:block; color:inherit; text-decoration:none;">
      <div class="cover" style="aspect-ratio: 4/3;">${DONAUDIO_SVG.cover(w.seed, 400, 300)}</div>
      <button class="add-btn" type="button" aria-label="添加到播放列表" title="添加到播放列表"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button class="play-btn" type="button" aria-label="试听">${DONAUDIO_SVG.playIcon()}</button>
      <div class="meta" style="padding: 12px 14px 14px;">
        <div class="title" style="font-weight:600; font-size:14px; margin-bottom:6px;">${w.t}</div>
        <div class="author" style="color:var(--ink-dim); font-size:12px;">${w.a}</div>
        <div class="stats" style="color:var(--ink-mute); font-size:11px; margin-top:6px; display:flex; gap:10px;">
          <span>${DONAUDIO_SVG.icons.eye} ${w.stats[1].toLocaleString()}</span>
          <span>${DONAUDIO_SVG.icons.heart} ${w.stats[0].toLocaleString()}</span>
        </div>
      </div>
    </a>
  </div>
`).join('') : `<div class="empty" style="grid-column:1/-1;">没有匹配的作品。试试其他关键词？</div>`;

/* ============== 用户 ============== */
const paneUsers = document.getElementById('paneUsers');
paneUsers.innerHTML = result.users.length ? result.users.map(u => `
  <a href="profile.html?u=${encodeURIComponent(u.name)}" class="user-card">
    <div class="av">${u.avatar || u.name.charAt(0)}</div>
    <div class="meta">
      <div class="name">${u.name}</div>
      <div class="role">${u.role}${u.location ? ' · ' + u.location : ''}</div>
      <div class="bio">${u.bio || ''}</div>
    </div>
  </a>
`).join('') : `<div class="empty">没有匹配的用户。</div>`;

/* ============== 资讯 ============== */
const paneNews = document.getElementById('paneNews');
paneNews.innerHTML = result.news.length ? result.news.map(n => `
  <a href="news.html?id=${n.id}" class="news-card">
    <div class="meta">
      <span class="tag">${n.tag}</span>
      <span>${n.source}</span>
      <span>${n.date}</span>
    </div>
    <div class="t">${n.title}</div>
    <div class="s">${n.text || ''}</div>
  </a>
`).join('') : `<div class="empty">没有匹配的资讯。</div>`;

/* Tab 切换 */
document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  [...e.currentTarget.children].forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const tab = btn.dataset.tab;
  document.querySelectorAll('.search-pane').forEach(p => {
    p.classList.toggle('on', p.dataset.pane === tab);
  });
});

/* 如果某个 tab 结果最多，默认展示它 */
(function pickDefaultTab() {
  const ranked = [
    ['works', result.works.length],
    ['users', result.users.length],
    ['news',  result.news.length],
  ].sort((a,b) => b[1] - a[1]);
  const top = ranked[0][0];
  if (ranked[0][1] === 0) return;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.search-pane').forEach(p => p.classList.remove('on'));
  document.querySelector(`#tabs button[data-tab="${top}"]`).classList.add('on');
  document.querySelector(`.search-pane[data-pane="${top}"]`).classList.add('on');
})();
</script>
<script src="assets/player.js?v=202605061719"></script>
<script src="assets/app.js?v=202605061719"></script>
</body>
